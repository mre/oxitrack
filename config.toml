# OxiTrack configuration — example / local-development defaults
#
# This file is committed to the repository as a convenience for local development.
# For production deployments, copy this file to a location outside the repository,
# edit the values, and point OxiTrack at it via the environment variable:
#
#   OXITRACK_CONFIG_FILE=/path/to/your/config.toml oxitrack
#
# The default config file path (used when the env var is not set) is "config.toml"
# relative to the working directory.

socket_address = "0.0.0.0:8080"
base_url       = "https://oxytrack.corrode.dev"
tracked_origin = "https://corrode.dev"

# For the first request to any new path, OxiTrack makes an outbound HTTP GET
# to tracked_origin_callback + path to verify the path exists before recording it.
# This adds latency to the very first visit on each new page. Set
# tracked_origin_callback to an internal address if your tracked site is behind
# a reverse proxy, to keep this round-trip on the local network.

# How many seconds a visitor must stay on a page before the visit is counted.
# Set to 0 in development so every visit registers immediately.
min_delay_secs = 0

[db]
# Path to the SQLite database file. Created automatically on first run.
path = "./oxitrack.db"

[utc_offset]
hours   = 0
minutes = 0