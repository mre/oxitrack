{% extends "base.html" %}

{% block content %}
    <table class="border-separate border-spacing-3">
        <tr>
            <td>Page</td>
            <td>
                <a href="{{ tracked_origin }}{{ path }}">{{ tracked_origin }}{{ path }}</a>
            </td>
        </tr>
        <tr>
            <td>#visits</td>
            <td>{{ n_visits }}</td>
        </tr>
        <tr>
            <td>visits/day</td>
            <td>{{ "{:.2}"|format(visits_per_day) }}</td>
        </tr>
    </table>

    <div class="relative w-full h-[50vh] md:h-[70vh] mb-12">
        <canvas id="bar_chart"></canvas>
    </div>

    <div class="relative w-full h-[50vh] md:h-[70vh] mb-12">
        <canvas id="line_chart"></canvas>
    </div>
{% endblock %}

{% block scripts %}
    <script src='/static/chart.umd.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>

    <script src='/static/chartjs-adapter-date-fns.bundle.min.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>

    <script type="module">
        async function render_bar_chart(history) {
            const data = [];

            const now = new Date();
            const now_day = now.getDate();
            const now_month = now.getMonth();
            const now_year = now.getFullYear();

            var iter_date = new Date(history[0]);
            var iter_day = iter_date.getDate();
            var iter_month = iter_date.getMonth();
            var iter_year = iter_date.getFullYear();
            var count = 1;

            for (const timestamp of history) {
                const date = new Date(timestamp);
                const day = date.getDate();
                const month = date.getMonth();
                const year = date.getFullYear();

                if (day == iter_day && month == iter_month && year == iter_year) {
                    count += 1;
                } else {
                    do {
                        data.push({x: `${iter_day}.${iter_month}.${iter_year}`, y: count});

                        iter_date.setDate(iter_day + 1);
                        iter_day = iter_date.getDate();
                        iter_month = iter_date.getMonth();
                        iter_year = iter_date.getFullYear();
                        count = 0;
                    } while (day != iter_day || month != iter_month || year != iter_year);

                    count = 1;
                }
            }

            while (now_day != iter_day || now_month != iter_month || now_year != iter_year) {
                data.push({x: `${iter_day}.${iter_month}.${iter_year}`, y: count});

                iter_date.setDate(iter_day + 1);
                iter_day = iter_date.getDate();
                iter_month = iter_date.getMonth();
                iter_year = iter_date.getFullYear();
                count = 0;
            }

            data.push({x: `${iter_day}.${iter_month}.${iter_year}`, y: count});

            new Chart(
                document.getElementById('bar_chart'), {
                    type: 'bar',
                    data: {
                        datasets: [{
                            label: 'Visits',
                            data: data
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Time'
                                },
                                ticks: {
                                    minRotation: 50,
                                    maxRotation: 50,
                                },
                            },
                            y: {
                                type: 'linear',
                                title: {
                                    display: true,
                                    text: 'Visits'
                                },
                                min: 0,
                                ticks: {
                                    stepSize: 1,
                                    minRotation: 0,
                                    maxRotation: 0
                                }
                            }
                        }
                    }
                }
            );
        }

        async function render_line_chart(history) {
            const data = history.map(function(element, index) { return {x: element, y: index + 1}; });

            new Chart(
                document.getElementById('line_chart'), {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Visits',
                            data: data
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        animation: false,
                        parsing: false,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        elements: {
                            point: {
                                radius: 2,
                                hitRadius: 4
                            },
                            line: {
                                borderWidth: 1
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                title: {
                                    display: true,
                                    text: 'Time'
                                },
                                min: {{ min_chart_timestamp }},
                                max: {{ max_chart_timestamp }},
                                ticks: {
                                    sampleSize: 100,
                                    minRotation: 50,
                                    maxRotation: 50,
                                    includeBounds: false
                                }
                            },
                            y: {
                                type: 'linear',
                                title: {
                                    display: true,
                                    text: 'Visits'
                                },
                                min: 0,
                                max: {{ n_visits + 2 }},
                                ticks: {
                                    stepSize: 1,
                                    minRotation: 0,
                                    maxRotation: 0
                                }
                            }
                        }
                    }
                }
            );
        }

        async function render_charts() {
            const history = {{ history }};

            if (history.length == 0) {
                return;
            }

            render_bar_chart(history);
            render_line_chart(history);
        }

        render_charts();
    </script>
{% endblock %}
