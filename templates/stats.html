{% extends "base.html" %}

{% block content %}
    <table class="border-separate border-spacing-3">
        <tr>
            <td>Page</td>
            <td>
                <a href="{{ tracked_origin }}{{ path }}">{{ tracked_origin }}{{ path }}</a>
            </td>
        </tr>
        <tr>
            <td>#visits</td>
            <td>{{ n_visits }}</td>
        </tr>
        <tr>
            <td>visits/day</td>
            <td>{{ "{:.2}"|format(visits_per_day) }}</td>
        </tr>
    </table>

    <div class="relative mb-12 w-full h-[50vh] md:h-[50vh]">
        <canvas id="bar_chart"></canvas>
    </div>

    <div class="relative mb-12 w-full h-[50vh] md:h-[50vh]">
        <canvas id="line_chart"></canvas>
    </div>
{% endblock %}

{% block scripts %}
    <script src='/static/stats.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>
    <script>oxitraffic.stats.render_charts({{ history }}, {{ min_chart_timestamp }}, {{ max_chart_timestamp }});</script>
{% endblock %}
