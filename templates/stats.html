{% extends "base.html" %}

{% block content %}
    <table class="border-separate border-spacing-4">
        <tr>
            <td>Page</td>
            <td>
                <a href="{{ tracked_origin }}{{ path }}">{{ tracked_origin }}{{ path }}</a>
            </td>
        </tr>
        <tr>
            <td>#visits</td>
            <td>{{ n_visits }}</td>
        </tr>
        <tr>
            <td>visits/day</td>
            <td>{{ "{:.2}"|format(visits_per_day) }}</td>
        </tr>
    </table>

    <div class="relative p-2 w-full h-[50vh] md:h-[70vh]">
        <canvas id="chart"></canvas>
    </div>
{% endblock %}

{% block scripts %}
    <script src='/static/chart.umd.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>

    <script src='/static/chartjs-adapter-date-fns.bundle.min.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>

    <script src='/static/hammer.min.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>
    <script src='/static/chartjs-plugin-zoom.min.js?v={{ env!("BUILD_TIMESTAMP") }}'></script>

    <script type="module">
        async function render_chart() {
            const history = {{ history }};
            const data = history.map(function(element, index) { return {x: element, y: index + 1}; });

            const zoom_options = {
                zoom: {
                    wheel: {
                        enabled: true
                    }
                },
                pan: {
                    enabled: true
                },
                limits: {
                    x: {
                        min: 'original',
                        max: 'original',
                        minRange: 180
                    },
                    y: {
                        min: 'original',
                        max: 'original',
                        minRange: 20
                    }
                },
                animation: {
                    duration: 0
                }
            };

            new Chart(
                document.getElementById('chart'), {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Visits',
                            data: data
                        }]
                    },
                    options: {
                        maintainAspectRatio: false,
                        animation: false,
                        parsing: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            zoom: zoom_options
                        },
                        elements: {
                            point: {
                                radius: 2,
                                hitRadius: 4
                            },
                            line: {
                                borderWidth: 1
                            }
                        },
                        scales: {
                            x: {
                                type: 'time',
                                title: {
                                    display: true,
                                    text: 'Time'
                                },
                                min: {{ min_chart_timestamp }},
                                max: {{ max_chart_timestamp }},
                                ticks: {
                                    sampleSize: 100,
                                    minRotation: 50,
                                    maxRotation: 50,
                                    includeBounds: false
                                }
                            },
                            y: {
                                type: 'linear',
                                title: {
                                    display: true,
                                    text: 'Visits'
                                },
                                min: 0,
                                max: {{ n_visits + 2 }},
                                ticks: {
                                    stepSize: 1,
                                    minRotation: 0,
                                    maxRotation: 0
                                }
                            }
                        },
                    }
                }
            );
        }

        render_chart();
    </script>
{% endblock %}
