{% extends "base.html" %}

{% block content %}
    <ul>
        {% for path in paths %}
            <li>
                {% if path.is_empty() %}
                    <a href="/dashboard/plot">INDEX</a>
                {% else %}
                    <a href="/dashboard/plot/{{ path }}">{{ path }}</a>
                {% endif %}
            </li>
        {% endfor %}
    </ul>
{% endblock %}
