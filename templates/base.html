<!DOCTYPE html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="referrer" content="no-referrer">
        <meta name="robots" content="noindex, nofollow">

        <title>{{ base.title }} — OxiTrack</title>

        <link rel="icon" href="/static/logo.svg">
        <link rel="stylesheet" href="/static/pico.min.css?v={{ env!("BUILD_TIMESTAMP") }}">
        <link rel="stylesheet" href="/static/style.css?v={{ env!("BUILD_TIMESTAMP") }}">
        <script src="/static/theme.js?v={{ env!("BUILD_TIMESTAMP") }}"></script>
        <script src="/static/htmx.min.js?v={{ env!("BUILD_TIMESTAMP") }}"></script>
        <script src="/static/echarts.min.js?v={{ env!("BUILD_TIMESTAMP") }}"></script>
        <script src="/static/chart.js?v={{ env!("BUILD_TIMESTAMP") }}" defer></script>
        <script src="/static/filter.js?v={{ env!("BUILD_TIMESTAMP") }}" defer></script>
        <script src="/static/sort.js?v={{ env!("BUILD_TIMESTAMP") }}" defer></script>
    </head>

    <body>
        <main class="container">
            {% block content %}{% endblock %}
        </main>

        <footer class="container-fluid">
            <small>
                UTC{{ base.utc_offset }} &middot;
                v{{ env!("CARGO_PKG_VERSION") }} &middot;
                <a href="https://codeberg.org/mo8it/oxitraffic" target="_blank" rel="noopener noreferrer">OxiTraffic</a>
            </small>
        </footer>
    </body>
</html>
