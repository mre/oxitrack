<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta name="referrer" content="no-referrer">

        <link rel="icon"
              type="image/x-icon"
              href="{{ base_url }}/static/logo.svg?v={{ env!("BUILD_TIMESTAMP") }}">

        <title>{{- base.title -}}</title>

        <link href='{{ base_url }}/static/main.css?v={{ env!("BUILD_TIMESTAMP") }}'
              rel="stylesheet">
    </head>

    <body class="flex flex-col p-1 mx-auto min-h-screen text-lg break-words lg:px-4">
        <header class="flex gap-x-4 items-center py-1 px-4 mb-2.5 bg-gray-200 rounded-full align-center">
            <a href="{{ base_url }}">
                <img class="w-9 h-9 transition duration-500 hover:scale-110"
                     src='{{ base_url }}/static/logo.svg?v={{ env!("BUILD_TIMESTAMP") }}'
                     alt="Logo">
            </a>

            <nav class="font-bold">
                <a class="no-underline" href="{{ base_url }}">OxiTraffic</a>
            </nav>
        </header>

        <main class="mx-1 mb-6 leading-relaxed">
            {% block content %}{% endblock %}
        </main>

        <footer class="py-2 mt-auto text-sm text-center bg-gray-100 rounded-xl">
            <p>All datetimes have the UTC offset {{ base.utc_offset }}</p>
            <p>
                v{{ env!("CARGO_PKG_VERSION") }} - <a href="https://codeberg.org/mo8it/oxitraffic" target="_blank">Source Code</a> 🦀
            </p>
        </footer>

        {% block scripts %}{% endblock %}
    </body>
</html>
