{% extends "base.html" %}

{% block content %}
    <p>Format: Registered path (number of visits)</p>
    <ul>
        {% for path_count in counts %}
            <li>
                <a href="/stats?path={{ path_count.path }}">{{ path_count.path }}</a> ({{ path_count.count }})
            </li>
        {% endfor %}
    </ul>
{% endblock %}
