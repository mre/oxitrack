{% extends "base.html" %} {% block content %}
<div class="page-header">
    <hgroup>
        <h1>Dashboard</h1>
        <p>
            Tracking
            <a href="{{ tracked_origin }}" target="_blank"
                >{{ tracked_origin }}</a
            >
        </p>
    </hgroup>
    <button id="theme-toggle" aria-label="Toggle theme">&#x25D1;</button>
</div>

<div id="stats-panel">
    <div class="chart-wrap">
        <div class="chart-header">
            <span class="muted-stat">
                <small
                    ><span id="total-visits">{{ total_visits }}</span> total
                    visits &mdash; {{ range.label() }}</small
                >
                <span
                    id="live-count"
                    hx-get="{{ live_url }}"
                    hx-trigger="load, every 5s"
                    hx-swap="innerHTML"
                ></span>
            </span>
            {% include "filter_buttons.html" %}
        </div>
        {% if !chart.is_empty() %}
        <div
            id="visits-chart"
            class="visits-chart"
            data-labels='[{% for bar in &chart %}{% if !loop.last %}"{{ bar.label }}",{% else %}"{{ bar.label }}"{% endif %}{% endfor %}]'
            data-counts="[{% for bar in &chart %}{% if !loop.last %}{{ bar.count }},{% else %}{{ bar.count }}{% endif %}{% endfor %}]"
        ></div>
        {% endif %}
    </div>

    {% include "pages_referrers.html" %}
</div>
<div id="live-path-set" hidden></div>
{% endblock %}
