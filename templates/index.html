{% extends "base.html" %}

{% block content %}
    Tracked website: <a href="{{ tracked_origin }}">{{ tracked_origin }}</a>

    <h2>Registered pages</h2>
    <p class="text-sm">Format: path (number of visits)</p>
    <ul>
        {% for path_count in counts %}
            <li>
                <a href="/stats?path={{ path_count.path }}">{{ path_count.path }}</a> ({{ path_count.count }})
            </li>
        {% endfor %}
    </ul>
{% endblock %}
