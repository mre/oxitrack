[package]
name = "oxitraffic"
version = "0.0.1"
edition = "2021"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"

[dependencies]
askama = { version = "0.12.0", default-features = false }
axum-extra = "0.7.5"
axum = { version = "0.6.19", default-features = false, features = ["http1", "tokio", "json"] }
config_builder = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
figment = { version = "0.10.10", features = ["yaml", "env"] }
futures = "0.3.28"
init_err = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
mime_guess = "2.0.4"
plotters = { version = "0.3.5", default-features = false, features = ["svg_backend", "line_series"] }
reqwest = { version = "0.11.18", default-features = false, features = ["rustls-tls"] }
resp_err = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
runner = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
rust-embed = "6.8.1"
serde = { version = "1.0.175", features = ["derive"] }
sqlx = { version = "0.7.1", default-features = false, features = ["runtime-tokio-rustls", "postgres", "macros", "migrate", "time"] }
static_handler = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
templ_resp = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
tokio = { version = "1.29.1", default-features = false, features = ["fs"] }
tracer = { git = "https://codeberg.org/mo8it/axum_helpers.git" }
tracing = "0.1.37"
time = { version = "0.3.23", features = ["formatting"] }

[profile.dev.package.sqlx-macros]
opt-level = 3
