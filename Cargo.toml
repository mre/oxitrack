[package]
name = "oxitraffic"
description = "Self-hosted, simple and privacy respecting website traffic tracker"
version = "0.10.5"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"
keywords = ["selfhosted", "analytics", "traffic"]
edition = "2021"
include = [
  "/.sqlx/",
  "/migrations/",
  "/src/",
  "/static/logo.svg.gz",
  "/static/main.css.gz",
  "/static/stats.js.gz",
  "/static/stats.js.map.gz",
  "/templates/",
  "/build.rs",
  "/LICENSE.txt",
  "/README.md",
]

[dependencies]
anyhow = "1.0"
askama = { version = "0.14", default-features = false, features = ["derive", "std"] }
askama_web = { version = "0.14", features = ["axum-0.8"] }
axum-ctx = "0.5"
axum = { version = "0.8", default-features = false, features = ["http1", "tokio", "json", "query"] }
bigdecimal = "0.4"
mime = "0.3"
oxi-axum-helpers = { version = "0.0.36", features = ["init", "postgres", "static_router"] }
rand = { version = "0.9", default-features = false, features = ["thread_rng"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
serde_urlencoded = "0.7"
serde = { version = "1", features = ["derive"] }
sqlx = { version = "0.8", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls", "macros", "migrate", "time", "bigdecimal"] }
time = "0.3"
tokio = { version = "1", default-features = false, features = ["rt-multi-thread"] }
tower-http = { version = "0.6", default-features = false, features = ["cors", "trace", "compression-gzip", "set-header"] }
tracing = { version = "0.1", default-features = false, features = ["std"] }
url = "2"

[dev-dependencies]
figment = { version = "0.10", features = ["test"] }
tower = { version = "0.5", default-features = false }

[build-dependencies]
time = "0.3"

[profile.dev]
strip = "debuginfo"

[profile.release]
lto = true
codegen-units = 1
strip = "debuginfo"

[profile.dev.package.sqlx-macros]
opt-level = 3

[profile.dev.package.askama_derive]
opt-level = 3

[patch.crates-io]
axum-ctx = { git = "https://codeberg.org/sgued/axum-ctx.git", rev = "175eddc9807078dbb0cde1937038c5a7b428e05b" }
oxi-axum-helpers = { git = "https://codeberg.org/sgued/oxi-axum-helpers.git", rev = "4a5778f8d7a3f5720b452d1c9a2b717a4f000eda" }
