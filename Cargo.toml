[package]
name = "oxitraffic"
description = "Self-hosted, simple and privacy respecting website traffic tracker"
version = "0.6.1"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"
keywords = ["selfhosted", "analytics", "traffic"]
edition = "2021"
include = [
  "/.sqlx/",
  "/migrations/",
  "/src/",
  "/static/index.js.gz",
  "/static/index.js.map.gz",
  "/static/logo.svg.gz",
  "/static/main.css.gz",
  "/static/stats.js.gz",
  "/static/stats.js.map.gz",
  "/templates/",
  "/build.rs",
  "/LICENSE.txt",
  "/README.md",
]

[dependencies]
anyhow = "1.0.75"
askama = { version = "0.12.1", default-features = false }
async-trait = "0.1.74"
axum-ctx = "0.1.0"
axum = { version = "0.6.20", default-features = false, features = ["http1", "tokio", "json", "query"] }
bigdecimal = "0.4.2"
figment = { version = "0.10.12", features = ["toml", "env", "test"] }
oxi-axum-helpers = { version = "0.0.20", features = ["postgres", "templates", "static_router"] }
reqwest = { version = "0.11.22", default-features = false, features = ["rustls-tls"] }
serde_json = "1.0.108"
serde_urlencoded = "0.7.1"
serde = { version = "1.0.190", features = ["derive"] }
sqlx = { version = "0.7.2", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls", "macros", "migrate", "time", "bigdecimal"] }
time = { version = "0.3.30" }
tokio = { version = "1.33.0", default-features = false, features = ["rt", "macros"] }
tower-http = { version = "0.4.4", default-features = false, features = ["cors", "trace", "compression-gzip"] }
tracing = "0.1.40"
url = "2.4.1"

[dev-dependencies]
hyper = { version = "0.14.27", default-features = false }
mime = "0.3.17"
tower = { version = "0.4.13", default-features = false }
typed-builder = "0.18.0"

[build-dependencies]
time = { version = "0.3.30" }

[profile.release]
lto = true
codegen-units = 1

[profile.dev.package.sqlx-macros]
opt-level = 3

[profile.dev.package.askama_derive]
opt-level = 3
