[package]
name = "oxitraffic"
description = "Self-hosted, simple and privacy respecting website traffic tracker"
version = "0.3.4"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"
keywords = ["selfhosted", "analytics", "traffic"]
edition = "2021"
exclude = [
  "bacon.toml",
  "CHANGELOG.md",
  "cliff.toml",
  "compose.yaml",
  "Containerfile",
  ".ignore",
  "input.css",
  "justfile",
  "oxitraffic.js",
  "package.json",
  "tailwind.config.js",
]

[dependencies]
askama = { version = "0.12.0", default-features = false }
axum = { version = "0.6.20", default-features = false, features = ["http2", "tokio", "json", "query"] }
figment = { version = "0.10.10", features = ["yaml", "env", "test"] }
futures = "0.3.28"
oxi-axum-helpers = { version = "0.0.8", features = ["templates", "static_handler", "db"] }
plotters = { version = "0.3.5", default-features = false, features = ["svg_backend", "line_series"] }
reqwest = { version = "0.11.18", default-features = false, features = ["rustls-tls"] }
rust-embed = "6.8.1"
sqlx = { version = "0.7.1", default-features = false, features = ["runtime-tokio-rustls", "postgres", "macros", "migrate", "time"] }
serde = { version = "1.0.182", features = ["derive"] }
time = { version = "0.3.25", features = ["formatting"] }
tower-http = { version = "0.4.3", default-features = false, features = ["cors", "trace", "compression-gzip"] }
tracing = "0.1.37"

[dev-dependencies]
hyper = { version = "0.14.27", default-features = false }
mime = "0.3.17"
tokio = { version = "1.29.1", default-features = false, features = ["rt", "macros"] }
tower = { version = "0.4.13", default-features = false }
typed-builder = "0.15.2"

[profile.dev.package.sqlx-macros]
opt-level = 3
