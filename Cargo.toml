[package]
name = "oxitraffic"
description = "Self-hosted, simple and privacy respecting website traffic tracker"
version = "0.10.2"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"
keywords = ["selfhosted", "analytics", "traffic"]
edition = "2021"
include = [
  "/.sqlx/",
  "/migrations/",
  "/src/",
  "/static/logo.svg.gz",
  "/static/main.css.gz",
  "/static/stats.js.gz",
  "/static/stats.js.map.gz",
  "/templates/",
  "/build.rs",
  "/LICENSE.txt",
  "/README.md",
]

[dependencies]
anyhow = "1.0.86"
async-trait = "0.1.81"
axum-ctx = "0.4.0"
axum = { version = "0.7.5", default-features = false, features = ["http1", "tokio", "json", "query"] }
bigdecimal = "0.4.5"
mime = "0.3.17"
oxi-axum-helpers = { version = "0.0.35", features = ["init", "postgres", "static_router"] }
rand = "0.8.5"
reqwest = { version = "0.12.5", default-features = false, features = ["rustls-tls"] }
rinja_axum = { version = "0.3.1", default-features = false }
serde_urlencoded = "0.7.1"
serde = { version = "1.0.208", features = ["derive"] }
sqlx = { version = "0.8.0", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls", "macros", "migrate", "time", "bigdecimal"] }
time = "0.3.36"
tokio = { version = "1.39.3", default-features = false, features = ["rt-multi-thread"] }
tower-http = { version = "0.5.2", default-features = false, features = ["cors", "trace", "compression-gzip"] }
tracing = { version = "0.1.40", default-features = false, features = ["std"] }
url = "2.5.2"

[dev-dependencies]
figment = { version = "0.10.19", features = ["test"] }
tower = { version = "0.4.13", default-features = false }

[build-dependencies]
time = "0.3.36"

[profile.dev]
strip = "debuginfo"

[profile.release]
lto = true
codegen-units = 1
strip = "debuginfo"

[profile.dev.package.sqlx-macros]
opt-level = 3

[profile.dev.package.rinja_derive]
opt-level = 3
