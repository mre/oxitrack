[package]
name = "oxitraffic"
description = "Self-hosted, simple and privacy respecting website traffic tracker"
version = "0.10.1"
authors = ["Mo Bitar <mo8it@proton.me>"]
repository = "https://codeberg.org/mo8it/oxitraffic"
license = "AGPL-3.0"
keywords = ["selfhosted", "analytics", "traffic"]
edition = "2021"
include = [
  "/.sqlx/",
  "/migrations/",
  "/src/",
  "/static/logo.svg.gz",
  "/static/main.css.gz",
  "/static/stats.js.gz",
  "/static/stats.js.map.gz",
  "/templates/",
  "/build.rs",
  "/LICENSE.txt",
  "/README.md",
]

[dependencies]
anyhow = "1.0.79"
askama = { version = "0.12.1", default-features = false }
async-trait = "0.1.77"
axum-ctx = "0.2.0"
axum = { version = "0.7.4", default-features = false, features = ["http1", "tokio", "json", "query"] }
bigdecimal = "0.4.2"
oxi-axum-helpers = { version = "0.0.30", features = ["toml", "postgres", "templates", "static_router"] }
rand = "0.8.5"
reqwest = { version = "0.11.23", default-features = false, features = ["rustls-tls"] }
serde_json = "1.0.112"
serde_urlencoded = "0.7.1"
serde = { version = "1.0.196", features = ["derive"] }
sqlx = { version = "0.7.3", default-features = false, features = ["postgres", "runtime-tokio", "tls-rustls", "macros", "migrate", "time", "bigdecimal"] }
time = { version = "0.3.31" }
tokio = { version = "1.35.1", default-features = false, features = ["rt-multi-thread"] }
tower-http = { version = "0.5.1", default-features = false, features = ["cors", "trace", "compression-gzip"] }
tracing = "0.1.40"
url = "2.5.0"

[dev-dependencies]
figment = { version = "0.10.14", features = ["test"] }
hyper = { version = "1.1.0", default-features = false }
mime = "0.3.17"
tower = { version = "0.4.13", default-features = false }
typed-builder = "0.18.1"

[build-dependencies]
time = { version = "0.3.30" }

[profile.release]
lto = true
codegen-units = 1

[profile.dev.package.sqlx-macros]
opt-level = 3

[profile.dev.package.askama_derive]
opt-level = 3
